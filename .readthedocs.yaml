# Read the Docs configuration. See:
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt

# HTML only. A PDF build of the large R->Python mapping table reliably fails in
# LaTeX and would mark the whole build "failed", so it is intentionally omitted.
# (autodoc imports the package with its heavy deps mocked -- see conf.py.)
formats: []
