name: Publish to PyPI

# Publishes on a GitHub Release using PyPI Trusted Publishing (OIDC) — no stored
# API tokens. Configure the trusted publisher once at
# https://pypi.org/manage/project/binomcikit/settings/publishing/
on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
